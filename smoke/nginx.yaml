apiVersion: apps/v1
kind: Deployment
metadata:
  name: smoke-nginx
  namespace: istio-system
spec:
  replicas: 1
  selector:
    matchLabels:
      app: smoke-nginx
  template:
    metadata:
      labels:
        app: smoke-nginx
    spec:
      containers:
        - name: nginx
          image: nginx:1.27.0
          ports:
            - containerPort: 80
          resources:
            requests:
              cpu: 50m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 64Mi
---
apiVersion: v1
kind: Service
metadata:
  name: smoke-nginx
  namespace: istio-system
spec:
  selector:
    app: smoke-nginx
  ports:
    - port: 80
      targetPort: 80
