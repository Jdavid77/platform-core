# =============================================================================
# .github/workflows/pulumi-sandbox.yaml — platform-sandbox pipeline
# =============================================================================
# Runs on every push to main.
#
# Prerequisites (Appendix A):
#   - GitHub self-hosted runner registered with label: local_laptop_runner
#   - pulumi, kubectl, flux, bats CLIs installed on runner
#   - GitHub Environment "platform-sandbox" configured with required reviewers
#   - Repository secret: PULUMI_ACCESS_TOKEN
# =============================================================================

name: Pulumi Sandbox

on:
  push:
    branches: [main]

jobs:
  # ── Lint ─────────────────────────────────────────────────────────────────────
  lint-code:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - name: Cache uv virtual environment
        uses: actions/cache@v4
        with:
          path: pulumi/.venv
          key: uv-venv-${{ runner.os }}-${{ hashFiles('pulumi/uv.lock') }}
          restore-keys: uv-venv-${{ runner.os }}-

      - name: Install dependencies
        run: uv sync --project pulumi/

      - name: Check code formatting with black
        run: uv run --project pulumi/ black --check --diff pulumi/

      - name: Type check with mypy
        run: uv run --project pulumi/ mypy pulumi/ --ignore-missing-imports

  # ── Static analysis ───────────────────────────────────────────────────────────
  static-analysis:
    runs-on: self-hosted
    needs: lint-code
    steps:
      - uses: actions/checkout@v4

      - name: Cache uv virtual environment
        uses: actions/cache@v4
        with:
          path: pulumi/.venv
          key: uv-venv-${{ runner.os }}-${{ hashFiles('pulumi/uv.lock') }}
          restore-keys: uv-venv-${{ runner.os }}-

      - name: Install dependencies
        run: uv sync --project pulumi/

      - name: Lint with ruff
        run: uv run --project pulumi/ ruff check pulumi/

      - name: Security scan with bandit
        run: uv run --project pulumi/ bandit -r pulumi/ -ll --exclude pulumi/.venv

  # ── Pulumi preview ───────────────────────────────────────────────────────────
  preview-sandbox:
    runs-on: self-hosted
    needs: static-analysis
    steps:
      - uses: actions/checkout@v4

      - name: Cache uv virtual environment
        uses: actions/cache@v4
        with:
          path: pulumi/.venv
          key: uv-venv-${{ runner.os }}-${{ hashFiles('pulumi/uv.lock') }}
          restore-keys: uv-venv-${{ runner.os }}-

      - name: Install dependencies
        run: uv sync --project pulumi/

      - uses: pulumi/actions@v6
        with:
          command: preview
          stack-name: Jdavid77/platform-core/platform-sandbox
          color: always
          work-dir: pulumi
        env:
          PULUMI_ACCESS_TOKEN: ${{ secrets.PULUMI_ACCESS_TOKEN }}

  # ── Manual approval gate ──────────────────────────────────────────────────────
  approve-sandbox:
    runs-on: self-hosted
    needs: preview-sandbox
    environment: platform-sandbox
    steps:
      - run: echo "Deployment approved"

  # ── Deploy ───────────────────────────────────────────────────────────────────
  update-sandbox:
    runs-on: self-hosted
    needs: approve-sandbox
    steps:
      - uses: actions/checkout@v4

      - name: Cache uv virtual environment
        uses: actions/cache@v4
        with:
          path: pulumi/.venv
          key: uv-venv-${{ runner.os }}-${{ hashFiles('pulumi/uv.lock') }}
          restore-keys: uv-venv-${{ runner.os }}-

      - name: Install dependencies
        run: uv sync --project pulumi/

      - uses: pulumi/actions@v6
        with:
          command: up
          stack-name: Jdavid77/platform-core/platform-sandbox
          color: always
          work-dir: pulumi
        env:
          PULUMI_ACCESS_TOKEN: ${{ secrets.PULUMI_ACCESS_TOKEN }}

  # ── Validate ─────────────────────────────────────────────────────────────────
  validate-sandbox:
    runs-on: self-hosted
    needs: update-sandbox
    steps:
      - uses: actions/checkout@v4

      - name: Export kubeconfig
        working-directory: pulumi
        env:
          PULUMI_STACK: platform-sandbox
        run: |
          pulumi stack output kubeconfig --show-secrets --stack "$PULUMI_STACK" > kubeconfig.yaml
          echo "KUBECONFIG=$PWD/kubeconfig.yaml" >> "$GITHUB_ENV"
          DOCKER_NETWORK=$(pulumi stack output dockerNetwork --stack "$PULUMI_STACK")
          echo "DOCKER_NETWORK=$DOCKER_NETWORK" >> "$GITHUB_ENV"

      - name: Run bats infrastructure tests
        env:
          PULUMI_STACK: platform-sandbox
        run: bats tests/infrastructure.bats

      - name: Force Flux reconciliation and smoke test
        env:
          PULUMI_STACK: platform-sandbox
          SMOKE_HOST: platform-sandbox.local
        run: bash scripts/flux_reconcile.sh

      - name: Clean up kubeconfig
        if: always()
        working-directory: pulumi
        run: rm -f kubeconfig.yaml
