kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
networking:
  podSubnet: 10.2.1.0/20
  serviceSubnet: 10.2.16.0/20
nodes:
- role: control-plane
  extraPortMappings:
  - hostPort: 8080
    containerPort: 80
    protocol: TCP
  - hostPort: 8443
    containerPort: 443
    protocol: TCP
- role: worker
