config:
  cluster-info:
    name: platform-sandbox
    kind-image: kindest/node:v1.36.1
    wait-seconds: 60
  network:
    dockerNetwork: vpc-platform-sandbox
    vpcCidr: 10.2.0.0/16
    podCidr: 10.2.1.0/20
    serviceCidr: 10.2.16.0/20
    extraPortMappings:
    - hostPort: 8080
      containerPort: 80
      protocol: TCP
    - hostPort: 8443
      containerPort: 443
      protocol: TCP
  flux:
    version: "2.9.x"
    url: "https://github.com/Jdavid77/platform-gitops"